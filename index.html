<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jay's School Intro</title>
    <style>
        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-screen {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 56.25vh; /* 9:16 Ratio */
            background-image: url('School Introduction.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Aligns content from the top */
            padding-top: 15vh; /* Adjust this to move the button up or down */
        }

        /* Blue Play Button with "Play" Text */
        .play-btn {
            width: 120px;
            height: 120px;
            background-color: #007AFF; /* Bright Blue */
            border: 4px solid white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s, background-color 0.3s;
            -webkit-tap-highlight-color: transparent;
            z-index: 10;
        }

        .play-btn:active {
            transform: scale(0.9);
            background-color: #0056b3;
        }

        /* Triangle Icon */
        .play-icon {
            width: 0; 
            height: 0; 
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 25px solid white;
            margin-left: 8px;
            margin-bottom: 2px;
        }

        .play-text {
            color: white;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Text Container */
        .text-container {
            margin-top: 30px;
            text-align: center;
            pointer-events: none;
            width: 90%;
        }

        /* Comic Sans for the main title */
        .main-title {
            font-family: "Comic Sans MS", "Comic Sans", cursive;
            font-size: 28px;
            color: #333;
            margin: 0;
            text-shadow: 1px 1px 0px white;
        }

        /* Monotype Corsiva for the subtitle */
        .sub-title {
            font-family: "Monotype Corsiva", "Apple Chancery", cursive;
            font-size: 24px;
            color: #444;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="phone-screen">
    <div class="play-btn" onclick="togglePlay()">
        <div class="play-icon" id="icon"></div>
        <div class="play-text">PLAY</div>
    </div>
    
    <div class="text-container">
        <h1 class="main-title">School Introduction</h1>
        <p class="sub-title">by Jay</p>
    </div>

    <audio id="jayAudio" src="Jay.m4a"></audio>
</div>

<script>
    const audio = document.getElementById("jayAudio");
    const icon = document.getElementById("icon");

    function togglePlay() {
        if (audio.paused) {
            audio.play();
            // Simple visual feedback: change icon to pause bars
            icon.style.border = "none";
            icon.style.width = "25px";
            icon.style.height = "25px";
            icon.style.borderLeft = "8px solid white";
            icon.style.borderRight = "8px solid white";
        } else {
            audio.pause();
            // Reset to triangle
            icon.style.width = "0";
            icon.style.height = "0";
            icon.style.borderTop = "15px solid transparent";
            icon.style.borderBottom = "15px solid transparent";
            icon.style.borderLeft = "25px solid white";
            icon.style.borderRight = "none";
        }
    }

    audio.onended = () => {
        icon.style.width = "0";
        icon.style.height = "0";
        icon.style.borderTop = "15px solid transparent";
        icon.style.borderBottom = "15px solid transparent";
        icon.style.borderLeft = "25px solid white";
        icon.style.borderRight = "none";
    };
</script>

</body>
</html>
